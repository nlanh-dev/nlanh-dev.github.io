<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiplication Table</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
}

/* card */
.container {
    width: 340px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    color: white;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1;}
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 8px;
    border-radius: 10px;
    border: none;
    margin: 10px 0;
    outline: none;
    transition: 0.3s;
}

input:focus {
    transform: scale(1.05);
}

/* button */
button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: white;
    color: #333;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
}

button:active {
    transform: scale(0.95);
}

/* result box */
.result {
    margin-top: 15px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.2);
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.6;
    animation: fadeIn 0.5s ease;
}

/* error */
.error {
    color: #ff4d4d;
    text-align: center;
    font-weight: bold;
    margin-top: 10px;
}
</style>

<script>
function display() {
    let a = document.getElementById("num").value;
    let resultBox = document.getElementById("result");
    let error = document.getElementById("error");

    resultBox.innerHTML = "";
    error.innerHTML = "";

    if (a === "" || isNaN(a)) {
        error.innerHTML = "⚠️ You must enter a number";
        return;
    }

    a = parseInt(a);

    let html = "<b>Multiplication table " + a + ":</b><br><br>";

    for (let i = 1; i <= 10; i++) {
        html += `${a} × ${i} = ${a*i} <br>`;
    }

    resultBox.innerHTML = html;
}
</script>

</head>

<body>

<div class="container">
    <h2>📊 Multiplication Table</h2>

    <input id="num" placeholder="Enter a number..." oninput="display()">

    <button onclick="display()">Generate</button>

    <div id="error" class="error"></div>

    <div id="result" class="result"></div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dates in Month</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        padding: 40px;
    }

    .container {
        display: flex;
        gap: 40px;
    }

    .card {
        background: white;
        padding: 20px 25px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 260px;
    }

    h2 {
        text-align: center;
        margin-bottom: 15px;
    }

    label {
        display: inline-block;
        width: 60px;
        margin-bottom: 10px;
    }

    input, select {
        padding: 5px;
        width: 130px;
    }

    .error {
        color: red;
        font-size: 12px;
    }
</style>

<script>
function isLeapYear(n) {
    return (n % 4 == 0 && n % 100 != 0) || n % 400 == 0;
}

function update(form) {
    let year = form.year;
    let month = form.month;
    let date = form.date;

    if (year.value === "" || isNaN(year.value)) {
        date.value = "Year must be a number";
        return;
    }

    switch (month.value) {
        case "1": case "3": case "5": case "7":
        case "8": case "10": case "12":
            date.value = 31;
            break;

        case "4": case "6": case "9": case "11":
            date.value = 30;
            break;

        case "2":
            date.value = isLeapYear(year.value) ? 29 : 28;
            break;
    }
}
</script>

</head>

<body>

<div class="container">

    <!-- FORM 1 (đúng) -->
    <div class="card">
        <h2>DATES IN MONTH</h2>

        <form name="f1">
            <div>
                <label>Year:</label>
                <input name="year" value="2014" onblur="update(this.form)">
            </div>

            <div>
                <label>Month:</label>
                <select name="month" onchange="update(this.form)">
                    <option value="1">01</option>
                    <option value="2" selected>02</option>
                    <option value="3">03</option>
                    <option value="4">04</option>
                    <option value="5">05</option>
                    <option value="6">06</option>
                    <option value="7">07</option>
                    <option value="8">08</option>
                    <option value="9">09</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
            </div>

            <div>
                <label>Date:</label>
                <input name="date" readonly>
            </div>
        </form>
    </div>

    <!-- FORM 2 (sai để test) -->
    <div class="card">
        <h2>DATES IN MONTH</h2>

        <form name="f2">
            <div>
                <label>Year:</label>
                <input name="year" value="a" onblur="update(this.form)">
            </div>

            <div>
                <label>Month:</label>
                <select name="month" onchange="update(this.form)">
                    <option value="1">01</option>
                    <option value="2" selected>02</option>
                    <option value="3">03</option>
                    <option value="4">04</option>
                    <option value="5">05</option>
                    <option value="6">06</option>
                    <option value="7">07</option>
                    <option value="8">08</option>
                    <option value="9">09</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
            </div>

            <div>
                <label>Date:</label>
                <input name="date" readonly>
            </div>
        </form>
    </div>

</div>

<script>
    // chạy khi load
    update(document.f1);
    update(document.f2);
</script>

</body>
</html>

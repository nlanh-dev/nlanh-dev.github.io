<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Demo CSS Selectors</title>
    <link rel="stylesheet" href="selectors.css">
</head>
<body>

    <!-- SELECT BY TAG -->
    <h2>Tag Selector (theo thẻ)</h2>
    <span>Đây là đoạn văn 1</span>
    <span><p>Đây là đoạn văn 2</p></span>
    <p>Đây là đoạn văn 3</p>

    <!-- SELECT BY ID -->
    <h2>ID Selector (duy nhất)</h2>
    <p id="special">Đây là đoạn văn đặc biệt (id="special")</p>
    <p>Đây là đoạn văn bình thường</p>

    <!-- SELECT BY CLASS -->
    <h2>Class Selector (nhiều phần tử)</h2>
    <p class="highlight">Đoạn này được highlight</p>
    <p class="highlight">Đoạn này cũng được highlight</p>
    <p>Đoạn này không có class</p>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    width: 600px;
    margin: 30px auto;
    background: white;
    padding: 20px 30px;
    border: 1px solid #ccc;
}

h2 {
    color: #c0392b;
}

hr {
    margin: 15px 0;
    border-top: 1px solid #ccc;
}

.row {
    display: flex;
    margin-bottom: 10px;
    align-items: center;
}

.label {
    width: 150px;
}

input, select {
    padding: 5px;
}

.error {
    color: red;
    font-size: 13px;
    margin-left: 150px;
}

/* checkbox */
.checkbox-group {
    display: flex;
    gap: 50px;
}

.checkbox-col {
    display: flex;
    flex-direction: column;
}

/* button */
.btn {
    text-align: center;
    margin-top: 20px;
}

button {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
}
</style>

<script>
function validateForm(event) {
    event.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let repassword = document.getElementById("repassword").value;
    let month = document.getElementById("month").value;

    let error = document.getElementById("errorMsg");
    error.innerHTML = "";

    // validate
    if (username === "") {
        error.innerHTML = "Username is required";
        return;
    }

    if (password === "") {
        error.innerHTML = "Password is required";
        return;
    }

    if (password !== repassword) {
        error.innerHTML = "Passwords do not match";
        return;
    }

    if (month === "") {
        error.innerHTML = "Please select your birth month";
        return;
    }

    // lưu dữ liệu
    let userData = {
        username: username,
        password: password,
        month: month
    };

    localStorage.setItem("user", JSON.stringify(userData));

    alert("✅ Registration successful!");
}
</script>

</head>

<body>

<div class="container">

<h2>REGISTRATION</h2>
<hr>

<form onsubmit="validateForm(event)">

<div class="row">
    <div class="label">Username:</div>
    <input id="username" type="text">
</div>

<div class="row">
    <div class="label">Password:</div>
    <input id="password" type="password">
</div>

<div class="row">
    <div class="label">Re-type Password:</div>
    <input id="repassword" type="password">
</div>

<hr>

<div class="row">
    <div class="label">Birthday:</div>
    <select id="month">
        <option value="">[select one]</option>
        <option>Jan</option>
        <option>Feb</option>
        <option>Mar</option>
    </select>
    <input type="text" placeholder="Day">
    <input type="text" placeholder="Year">
</div>

<div id="errorMsg" class="error"></div>

<hr>

<div class="row">
    <div class="label">Images:</div>
    <input type="file">
</div>

<hr>

<div class="row">
    <div class="label">First Name:</div>
    <input type="text">
</div>

<div class="row">
    <div class="label">Last Name:</div>
    <input type="text">
</div>

<hr>

<div class="row">
    <div class="label">Interests:</div>

    <div class="checkbox-group">
        <div class="checkbox-col">
            <label><input type="checkbox"> Entertainment</label>
            <label><input type="checkbox"> Home & Family</label>
            <label><input type="checkbox"> Health</label>
            <label><input type="checkbox"> Music</label>
        </div>

        <div class="checkbox-col">
            <label><input type="checkbox"> Business</label>
            <label><input type="checkbox"> Computers</label>
            <label><input type="checkbox"> Finance</label>
            <label><input type="checkbox"> Small Business</label>
        </div>
    </div>
</div>

<div class="btn">
    <button type="submit">REGISTER</button>
</div>

</form>

</div>

</body>
</html>

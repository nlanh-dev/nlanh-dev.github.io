<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>REGISTRATION</h2>
<hr>

<form id="regForm">

<div class="row">
    <div class="label">Username:</div>
    <input id="username" type="text">
</div>

<div class="row">
    <div class="label">Password:</div>
    <input id="password" type="password">
</div>

<div class="row">
    <div class="label">Re-type Password:</div>
    <input id="repassword" type="password">
</div>

<hr>

<div class="row">
    <div class="label">Birthday:</div>

    <select id="month">
        <option value="">[select one]</option>
        <option value="1">Jan</option>
        <option value="2">Feb</option>
        <option value="3">Mar</option>
        <option value="4">Apr</option>
        <option value="5">May</option>
        <option value="6">Jun</option>
        <option value="7">Jul</option>
        <option value="8">Aug</option>
        <option value="9">Sep</option>
        <option value="10">Oct</option>
        <option value="11">Nov</option>
        <option value="12">Dec</option>
    </select>

    <input type="text" placeholder="Day">
    <input type="text" placeholder="Year">
</div>

<div id="errorMsg" class="error"></div>

<hr>

<div class="row">
    <div class="label">Images:</div>
    <input type="file">
</div>

<hr>

<div class="row">
    <div class="label">First Name:</div>
    <input type="text">
</div>

<div class="row">
    <div class="label">Last Name:</div>
    <input type="text">
</div>

<hr>

<div class="row">
    <div class="label">Interests (optional):</div>

    <div class="checkbox-group">
        <div class="checkbox-col">
            <label><input type="checkbox"> Entertainment</label>
            <label><input type="checkbox"> Home & Family</label>
            <label><input type="checkbox"> Health</label>
            <label><input type="checkbox"> Music</label>
        </div>

        <div class="checkbox-col">
            <label><input type="checkbox"> Business</label>
            <label><input type="checkbox"> Computers & Technology</label>
            <label><input type="checkbox"> Personal Finance</label>
            <label><input type="checkbox"> Small Business</label>
        </div>
    </div>
</div>

<div class="btn">
    <button type="submit">REGISTER</button>
</div>

</form>

</div>

<script src="script.js"></script>
</body>
</html>
